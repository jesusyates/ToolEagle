name: E2E

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build Next.js
        run: npm run build

      - name: Run E2E (mocked /api/generate)
        run: npm run test:e2e
        env:
          CI: true
