name: Text Audit

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  text-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run changed-files text audit (PR)
        if: github.event_name == 'pull_request'
        run: npm run audit:text:changed

      - name: Run full text audit (main push)
        if: github.event_name == 'push'
        run: npm run audit:text

      - name: Run tool quality audit
        run: npm run audit:tools
